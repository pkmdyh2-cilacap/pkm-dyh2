<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <title>Login - Puskesmas Dayeuhluhur II</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-8">
      <img src="logo.png" alt="Puskesmas" class="h-16 mx-auto mb-4">
      <h1 class="text-2xl font-bold text-gray-800">Bank Data Puskesmas</h1>
      <p class="text-sm text-gray-500 mt-1">Puskesmas Dayeuhluhur II</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition"
               placeholder="admin@puskesmas.id">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition"
               placeholder="Masukkan password">
      </div>
      <button type="submit"
              class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-lg transition shadow-sm">
        Masuk
      </button>
      <div id="errorMsg" class="text-sm text-red-600 text-center hidden"></div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');
      errorEl.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Login gagal';
          errorEl.classList.remove('hidden');
          return;
        }
        localStorage.setItem('pkm_token', data.token);
        window.location.href = '/index.html';
      } catch (err) {
        errorEl.textContent = 'Terjadi kesalahan: ' + err.message;
        errorEl.classList.remove('hidden');
      }
    });

    if (localStorage.getItem('pkm_token')) {
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
