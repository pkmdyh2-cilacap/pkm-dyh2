<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dokumen Pralokmin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    @media (max-width:640px){button,a{min-height:44px;display:inline-flex;align-items:center}.container{padding-left:.75rem;padding-right:.75rem}}
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-6 md:p-8">
    <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6 flex items-center gap-2">
      <i class="fas fa-file-alt text-emerald-600"></i> Dokumen Pralokmin
    </h1>

    <form id="pralokminForm" class="space-y-6" novalidate>

      <!-- Waktu -->
      <div>
        <label for="bulanTahun" class="block text-sm font-medium text-gray-700 mb-1">
          <i class="far fa-calendar-alt mr-1"></i> Waktu (Bulan & Tahun) <span class="text-red-500">*</span>
        </label>
        <input type="month" id="bulanTahun" name="bulanTahun" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition" />
      </div>

      <!-- Klaster (dropdown) -->
      <div>
        <label for="klasterSelect" class="block text-sm font-medium text-gray-700 mb-1">
          <i class="fas fa-layer-group mr-1"></i> Klaster <span class="text-red-500">*</span>
        </label>
        <select id="klasterSelect" name="klaster" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition">
          <option value="">-- Pilih Klaster --</option>
          <option value="1">Klaster 1</option>
          <option value="2">Klaster 2</option>
          <option value="3">Klaster 3</option>
          <option value="4">Klaster 4</option>
          <option value="5">Klaster 5</option>
        </select>
        <div id="klasterError" class="text-sm text-red-600 mt-2 hidden"></div>
      </div>

      <!-- Upload Undangan -->
      <div>
        <label for="fileUndangan" class="block text-sm font-medium text-gray-700 mb-1">
          <i class="fas fa-envelope mr-1"></i> File Undangan <span class="text-red-500">*</span>
        </label>
        <div class="relative border-2 border-dashed border-gray-300 rounded-lg p-4 hover:border-emerald-400 transition text-center">
          <input type="file" id="fileUndangan" name="undangan" accept=".pdf"
                 class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
          <div class="flex flex-col items-center justify-center pointer-events-none">
            <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-1"></i>
            <p class="text-gray-600 font-medium text-sm">Klik atau seret file PDF</p>
            <p class="text-xs text-gray-400">Maksimal 5 MB</p>
          </div>
        </div>
        <div id="errorUndangan" class="text-sm text-red-600 mt-2 hidden"></div>
        <div id="infoUndangan" class="text-sm text-green-600 mt-2 hidden"></div>
      </div>

      <!-- Upload Notulen -->
      <div>
        <label for="fileNotulen" class="block text-sm font-medium text-gray-700 mb-1">
          <i class="fas fa-pen mr-1"></i> Notulen <span class="text-red-500">*</span>
        </label>
        <div class="relative border-2 border-dashed border-gray-300 rounded-lg p-4 hover:border-emerald-400 transition text-center">
          <input type="file" id="fileNotulen" name="notulen" accept=".pdf"
                 class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
          <div class="flex flex-col items-center justify-center pointer-events-none">
            <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-1"></i>
            <p class="text-gray-600 font-medium text-sm">Klik atau seret file PDF</p>
            <p class="text-xs text-gray-400">Maksimal 5 MB</p>
          </div>
        </div>
        <div id="errorNotulen" class="text-sm text-red-600 mt-2 hidden"></div>
        <div id="infoNotulen" class="text-sm text-green-600 mt-2 hidden"></div>
      </div>

      <!-- Upload Daftar Hadir -->
      <div>
        <label for="fileDaftarHadir" class="block text-sm font-medium text-gray-700 mb-1">
          <i class="fas fa-users mr-1"></i> Daftar Hadir <span class="text-red-500">*</span>
        </label>
        <div class="relative border-2 border-dashed border-gray-300 rounded-lg p-4 hover:border-emerald-400 transition text-center">
          <input type="file" id="fileDaftarHadir" name="daftar_hadir" accept=".pdf"
                 class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
          <div class="flex flex-col items-center justify-center pointer-events-none">
            <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-1"></i>
            <p class="text-gray-600 font-medium text-sm">Klik atau seret file PDF</p>
            <p class="text-xs text-gray-400">Maksimal 5 MB</p>
          </div>
        </div>
        <div id="errorDaftarHadir" class="text-sm text-red-600 mt-2 hidden"></div>
        <div id="infoDaftarHadir" class="text-sm text-green-600 mt-2 hidden"></div>
      </div>

      <!-- Upload Lampiran -->
      <div>
        <label for="fileLampiran" class="block text-sm font-medium text-gray-700 mb-1">
          <i class="fas fa-paperclip mr-1"></i> Lampiran <span class="text-red-500">*</span>
        </label>
        <div class="relative border-2 border-dashed border-gray-300 rounded-lg p-4 hover:border-emerald-400 transition text-center">
          <input type="file" id="fileLampiran" name="lampiran" accept=".pdf"
                 class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
          <div class="flex flex-col items-center justify-center pointer-events-none">
            <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-1"></i>
            <p class="text-gray-600 font-medium text-sm">Klik atau seret file PDF</p>
            <p class="text-xs text-gray-400">Maksimal 5 MB</p>
          </div>
        </div>
        <div id="errorLampiran" class="text-sm text-red-600 mt-2 hidden"></div>
        <div id="infoLampiran" class="text-sm text-green-600 mt-2 hidden"></div>
      </div>

      <div class="flex justify-end pt-2">
        <button type="submit"
                class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-6 rounded-lg transition flex items-center gap-2 shadow-sm">
          <i class="fas fa-paper-plane"></i> Simpan
        </button>
      </div>
    </form>

    <div class="mt-6 text-center">
      <a href="index.html" class="inline-block px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
        <i class="fas fa-arrow-left mr-2"></i> Kembali ke Beranda
      </a>
    </div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('pralokminForm');
      const bulanTahun = document.getElementById('bulanTahun');
      const klasterSelect = document.getElementById('klasterSelect');
      const klasterError = document.getElementById('klasterError');

      const uploads = [
        { id: 'fileUndangan', errorId: 'errorUndangan', infoId: 'infoUndangan', key: 'undangan' },
        { id: 'fileNotulen', errorId: 'errorNotulen', infoId: 'infoNotulen', key: 'notulen' },
        { id: 'fileDaftarHadir', errorId: 'errorDaftarHadir', infoId: 'infoDaftarHadir', key: 'daftar_hadir' },
        { id: 'fileLampiran', errorId: 'errorLampiran', infoId: 'infoLampiran', key: 'lampiran' }
      ];

      function validateFile(input, errorEl, infoEl) {
        const file = input.files[0];
        errorEl.classList.add('hidden');
        infoEl.classList.add('hidden');
        errorEl.textContent = '';
        infoEl.textContent = '';
        if (!file) return true;
        const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
        if (!isPdf) {
          errorEl.textContent = '❌ Hanya file PDF yang diperbolehkan.';
          errorEl.classList.remove('hidden');
          input.value = '';
          return false;
        }
        if (file.size > 5 * 1024 * 1024) {
          errorEl.textContent = '❌ Ukuran file maksimal 5 MB.';
          errorEl.classList.remove('hidden');
          input.value = '';
          return false;
        }
        infoEl.textContent = `✅ ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
        infoEl.classList.remove('hidden');
        return true;
      }

      uploads.forEach(u => {
        const input = document.getElementById(u.id);
        const err = document.getElementById(u.errorId);
        const info = document.getElementById(u.infoId);
        input.addEventListener('change', () => validateFile(input, err, info));
      });

      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        if (!bulanTahun.value) { alert('Pilih Bulan & Tahun.'); bulanTahun.focus(); return; }

        klasterError.classList.add('hidden');
        const klaster = klasterSelect.value;
        if (!klaster) {
          klasterError.textContent = '❌ Pilih Klaster.';
          klasterError.classList.remove('hidden');
          klasterSelect.focus();
          return;
        }

        // Validasi file
        let allValid = true;
        let firstInvalid = null;
        for (const u of uploads) {
          const input = document.getElementById(u.id);
          const err = document.getElementById(u.errorId);
          const info = document.getElementById(u.infoId);
          const valid = validateFile(input, err, info);
          if (!valid) { allValid = false; if (!firstInvalid) firstInvalid = input; }
          if (!input.files || input.files.length === 0) {
            allValid = false;
            err.textContent = '❌ File wajib diunggah.';
            err.classList.remove('hidden');
            if (!firstInvalid) firstInvalid = input;
          }
        }

        if (!allValid) {
          alert('Lengkapi semua upload dengan PDF (max 5 MB).');
          if (firstInvalid) firstInvalid.focus();
          return;
        }

        // Siapkan FormData untuk dikirim ke API
        const formData = new FormData();
        formData.append('bulan', bulanTahun.value);
        formData.append('klaster', klaster);
        formData.append('undangan', document.getElementById('fileUndangan').files[0]);
        formData.append('notulen', document.getElementById('fileNotulen').files[0]);
        formData.append('daftar_hadir', document.getElementById('fileDaftarHadir').files[0]);
        formData.append('lampiran', document.getElementById('fileLampiran').files[0]);

        try {
          const response = await fetch('https://pkm-dyh2.onrender.com/api/upload', {
            method: 'POST',
            body: formData
          });
          const result = await response.json();
          if (result.success) {
            alert(`✅ Data Klaster ${klaster} untuk ${bulanTahun.value} berhasil disimpan!`);
            form.reset();
            // Set bulan ke sekarang
            const now = new Date();
            bulanTahun.value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
            // Sembunyikan info
            uploads.forEach(u => {
              document.getElementById(u.infoId).classList.add('hidden');
              document.getElementById(u.errorId).classList.add('hidden');
            });
          } else {
            alert('❌ Gagal upload: ' + result.error);
          }
        } catch (err) {
          alert('❌ Error: ' + err.message);
        }
      });

      // Set default bulan
      const now = new Date();
      bulanTahun.value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    })();
  </script>
</body>
</html>
